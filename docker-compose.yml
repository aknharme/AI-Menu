services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-menu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_menu}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_menu}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ai-menu-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        server_pid=$$!
        sleep 5
        ollama pull ${OLLAMA_MODEL:-qwen2.5:3b}
        wait $$server_pid
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ai-menu-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-ai_menu};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: ${OLLAMA_MODEL:-qwen2.5:3b}
      Jwt__Issuer: ${JWT_ISSUER:-AiMenu.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-AiMenu.Apps}
      Jwt__SecretKey: ${JWT_SECRET:-AiMenu_Local_Development_Secret_Key_2026_Change_Me_123456}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-180}
    expose:
      - "8080"

  customer-web:
    build:
      context: ./frontend/customer-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${CUSTOMER_WEB_API_BASE_URL:-/api}
    container_name: ai-menu-customer-web
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  admin-web:
    build:
      context: ./frontend/admin-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${ADMIN_WEB_API_BASE_URL:-/api}
        VITE_APP_BASE_PATH: ${ADMIN_WEB_BASE_PATH:-/admin/}
        VITE_CUSTOMER_BASE_URL: ${CUSTOMER_BASE_URL:-http://localhost}
    container_name: ai-menu-admin-web
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  cashier-web:
    build:
      context: ./frontend/cashier-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${CASHIER_WEB_API_BASE_URL:-/api}
        VITE_APP_BASE_PATH: ${CASHIER_WEB_BASE_PATH:-/cashier/}
    container_name: ai-menu-cashier-web
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-menu-nginx
    restart: unless-stopped
    depends_on:
      - api
      - customer-web
      - admin-web
      - cashier-web
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"

volumes:
  postgres-data:
  ollama-data:
