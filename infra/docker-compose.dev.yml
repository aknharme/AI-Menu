version: "3.9"

services:
  api:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /workspace/api
    command: sh -c "dotnet restore && dotnet run --urls=http://0.0.0.0:5000"
    volumes:
      - ../:/workspace
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  customer-web:
    image: node:20-alpine
    working_dir: /workspace/customer-web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ../:/workspace
    ports:
      - "5173:5173"
    depends_on:
      - api

  admin-web:
    image: node:20-alpine
    working_dir: /workspace/admin-web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    volumes:
      - ../:/workspace
    ports:
      - "5174:5174"
    depends_on:
      - api

  cashier-web:
    image: node:20-alpine
    working_dir: /workspace/cashier-web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5175"
    volumes:
      - ../:/workspace
    ports:
      - "5175:5175"
    depends_on:
      - api
